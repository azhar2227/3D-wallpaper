<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D wallpaper - ऑनलाइन शॉपिंग</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- हैडर -->
    <header>
        <div class="logo">🛒 3D wallpaper</div>
        <nav>
            <a href="#" onclick="showSection('home')">होम</a>
            <a href="#" onclick="showSection('products')">प्रोडक्ट्स</a>
            <a href="#" onclick="showSection('cart')">कार्ट (<span id="cart-count">0</span>)</a>
            <a href="#" onclick="showSection('contact')">संपर्क</a>
        </nav>
    </header>

    <!-- होम सेक्शन -->
    <section id="home" class="section active">
        <div class="hero">
            <h1>3D wallpaper में आपका स्वागत है</h1>
            <p>बेहतरीन प्रोडक्ट्स, सबसे कम कीमतों पर। अभी खरीदारी शुरू करें!</p>
            <button onclick="showSection('products')">खरीदारी शुरू करें</button>
        </div>
    </section>

    <!-- प्रोडक्ट्स सेक्शन -->
    <section id="products" class="section">
        <h2>हमारे प्रोडक्ट्स</h2>
        <div class="product-grid" id="product-grid">
            <!-- JavaScript से भरेगा -->
        </div>
    </section>

    <!-- कार्ट सेक्शन -->
    <section id="cart" class="section">
        <h2>आपका कार्ट</h2>
        <div id="cart-items"></div>
        <div id="cart-total"></div>
        <button id="checkout-btn" onclick="checkout()">चेकआउट करें</button>
    </section>

    <!-- संपर्क सेक्शन -->
    <section id="contact" class="section">
        <h2>संपर्क करें</h2>
        <p>ईमेल: support@kushalshop.com</p>
        <p>फ़ोन: +91-9999999999</p>
    </section>

    <!-- चेकआउट मोडल -->
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>चेकआउट फॉर्म</h2>
            <form id="checkout-form">
                <input type="text" placeholder="पूरा नाम" required>
                <input type="text" placeholder="पता" required>
                <input type="text" placeholder="शहर" required>
                <input type="text" placeholder="पिन कोड" required>
                <input type="text" placeholder="फ़ोन नंबर" required>
                <button type="submit">ऑर्डर कन्फर्म करें</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
