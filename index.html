<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpaper Hub - 3D वॉलपेपर शॉप</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">🖼️ Wallpaper Hub</div>
        <nav>
            <a href="#" onclick="showSection('home')">होम</a>
            <a href="#" onclick="showSection('products')">वॉलपेपर</a>
            <a href="#" onclick="showSection('cart')">कार्ट (<span id="cart-count">0</span>)</a>
            <a href="#" onclick="showSection('contact')">संपर्क</a>
        </nav>
    </header>

    <section id="home" class="section active">
        <div class="hero">
            <h1>Wallpaper Hub में आपका स्वागत है</h1>
            <p>शानदार 3D वॉलपेपर, सबसे सस्ते दामों पर। अभी अपनी स्क्रीन को नया लुक दें!</p>
            <button onclick="showSection('products')">वॉलपेपर देखें</button>
        </div>
    </section>

    <section id="products" class="section">
        <h2>हमारे 3D वॉलपेपर</h2>
        <div class="product-grid" id="product-grid"></div>
    </section>

    <section id="cart" class="section">
        <h2>आपका कार्ट</h2>
        <div id="cart-items"></div>
        <div id="cart-total"></div>
        <button id="checkout-btn" onclick="checkout()">चेकआउट करें</button>
    </section>

    <section id="contact" class="section">
        <h2>संपर्क करें</h2>
        <p>ईमेल: support@wallpaperhub.com</p>
        <p>फ़ोन: +91-9999999999</p>
    </section>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>चेकआउट फॉर्म</h2>
            <form id="checkout-form">
                <input type="text" placeholder="पूरा नाम" required>
                <input type="text" placeholder="पता" required>
                <input type="text" placeholder="शहर" required>
                <input type="text" placeholder="पिन कोड" required>
                <input type="text" placeholder="फ़ोन नंबर" required>
                <button type="submit">ऑर्डर कन्फर्म करें</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
